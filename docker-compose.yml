services:
  web:
    image: wolxxxy/php85:latest
    restart: always
    environment:
      - TZ=Europe/Berlin
    networks:
      - backend
    ports:
      - "127.0.0.1:$WEB_PORT:80"
    volumes:
      - ./docker-volumes/apache/conf:/etc/apache2/sites-available/000-default.conf
      - .:/var/www
    depends_on:
      - db
  db:
    image: mariadb:11
    restart: always
    networks:
      - backend
    ports:
      - "127.0.0.1:$DB_PORT:3306"
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - TZ=Europe/Berlin
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=deploy_monitor
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
volumes:
  db_data:
networks:
  backend: